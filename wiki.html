<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki</title>
    <link rel="stylesheet" href="styles/wiki.css">
    <link rel="stylesheet" href="styles/footer.css">
</head>
<body>
    <!-- ═══════════════ HEADER ═══════════════ -->
    <header>
        <div class="logo">
            <img src="assets/images/logos/pictorial mark logo-green.svg">
        </div>
        <div class="features">
            <div class="search">
                <input id="searchInput" class="search-input" type="text"
                       placeholder="Tìm kiếm động vật, loài, môi trường sống…" autocomplete="off"/>
            </div>
        </div>
    </header>

    <!-- ═══════════════ TABLE CONTENT ═══════════════ -->
    <section id="table-content">
        <h3>Mục Lục</h3>
        <ul>
            <li><a href="#">Ngoại hình</a></li>
            <li><a href="#">Lối sống</a></li>
            <li><a href="#">Tiểu sử</a></li>
        </ul>
    </section>

    <!-- ═══════════════ CONTENT ═══════════════ -->
    <section id="content">
        <div class="title">
            <h2></h2>
            <p></p>
            <ul class="tags"></ul>
        </div>
        <div class="appearance">
            <h3>Ngoại hình</h3>
            <div class="content"></div>
        </div>
        <div class="lifestyle">
            <h3>Lối sống</h3>
            <div class="content"></div>
        </div>
        <div class="biography">
            <h3>Tiểu sử</h3>
            <div class="content"></div>
        </div>
    </section>

    <!-- ═══════════════ FOOTER ═══════════════ -->
    <div id="footer-container"></div>

    <script src="scripts/footer.js"></script>
</body>

</html>
